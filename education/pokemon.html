<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>My Pokémon TCG collection</title>
    <link href="../core.css" rel="stylesheet">
    <script src="../nav-menu.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Source+Code+Pro:wght@400;500;600&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --card-bg: #fefefe;
            --type-psychic: #792f8c;
            --type-darkness: #5a5465;
            --type-electric: #f7d02c;
            --type-dragon: #6f35fc;
            --type-rock: #b6a136;
            --type-colorless: #707067;
            --type-fire: #ff0000;
            --type-metal: #b7b7ce;
            --type-grass: #7ac74c;
            --type-water: #6390f0;
            --type-fighting: #c22e28;
        }

        .page-title {
            font-size: 2.5rem;
            margin: 2rem 0 1rem;
            color: var(--darker);
            border-left: 6px solid var(--primary);
            padding-left: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-title i {
            color: var(--primary);
            font-size: 2rem;
        }

        .search-wrapper {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            background: white;
            border-radius: 60px;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-light);
            max-width: 500px;
        }
        .search-wrapper i {
            color: var(--gray);
            font-size: 1.2rem;
        }
        #searchInput {
            flex: 1;
            border: none;
            padding: 0.8rem 0.5rem;
            font-size: 1rem;
            background: transparent;
            outline: none;
        }
        #clearSearch {
            background: var(--gray-light);
            border: none;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            font-size: 1.2rem;
            cursor: pointer;
            color: var(--dark);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            margin-right: 0.3rem;
        }
        #clearSearch:hover {
            background: var(--gray);
            color: white;
        }

        .section-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-light);
            transition: var(--transition);
        }

        .section-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .section-heading {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 2px solid var(--gray-light);
            padding-bottom: 0.6rem;
        }

        .section-heading i {
            color: var(--primary);
            font-size: 1.6rem;
        }

        .subsection-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 1.8rem 0 1rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .subsection-title i {
            color: var(--secondary);
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .item-card, .pokemon-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0.8rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            border: 1px solid var(--gray-light);
            position: relative;
        }
        .item-card:hover, .pokemon-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .card-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: contain;
            background: #f5f5f5;
            border-radius: 8px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            border: 1px solid #eee;
            transition: opacity 0.1s;
        }
        .card-thumb:hover {
            opacity: 0.9;
        }

        .pokemon-card {
            border-left: 5px solid transparent;
        }

        .pokemon-name {
            font-weight: 700;
            font-size: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 0.2rem 0;
        }
        .pokemon-name span {
            background: var(--primary);
            color: white;
            border-radius: 30px;
            padding: 0.2rem 0.6rem;
            font-size: 0.65rem;
            font-weight: 500;
        }

        .pokemon-details {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.2rem 0;
            color: var(--gray);
            font-size: 0.8rem;
        }
        .pokemon-details i {
            width: 1rem;
            color: var(--primary);
        }

        .pokemon-stage {
            background: var(--light);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--dark);
            display: inline-block;
            margin-right: 0.5rem;
        }

        .hp-value {
            font-weight: 600;
            color: var(--accent);
        }

        .qty-badge {
            background: var(--primary-dark);
            color: white;
            border-radius: 30px;
            padding: 0.1rem 0.5rem;
            font-size: 0.7rem;
            margin-left: 0.3rem;
            align-self: flex-end;
        }

        .foil-star {
            color: #fbbf24;
            margin-left: 0.3rem;
            font-size: 0.8rem;
        }

        .foil-badge {
            background: linear-gradient(135deg, #d4af37, #f5e18b);
            color: #1e1e1e;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
        }

        .item-name {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 0.2rem 0;
        }

        .card-set {
            font-size: 0.65rem;
            color: var(--gray);
            margin-top: 0.2rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .card-set i {
            color: var(--primary);
            width: 0.9rem;
            font-size: 0.7rem;
        }
        .set-abbr {
            font-weight: 600;
            color: var(--primary-dark);
            background: rgba(0,0,0,0.05);
            padding: 0.1rem 0.3rem;
            border-radius: 4px;
            margin-right: 0.3rem;
        }

        .type-psychic { border-left-color: var(--type-psychic); }
        .type-darkness { border-left-color: var(--type-darkness); }
        .type-electric { border-left-color: var(--type-electric); }
        .type-dragon { border-left-color: var(--type-dragon); }
        .type-rock { border-left-color: var(--type-rock); }
        .type-colorless { border-left-color: var(--type-colorless); }
        .type-fire { border-left-color: var(--type-fire); }
        .type-metal { border-left-color: var(--type-metal); }
        .type-grass { border-left-color: var(--type-grass); }
        .type-water { border-left-color: var(--type-water); }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            background: white;
            padding: 1rem;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            position: relative;
        }
        .modal-content img {
            width: 100%;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            display: block;
        }
        .close-modal {
            position: absolute;
            top: -10px;
            right: -10px;
            background: white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            cursor: pointer;
            border: 1px solid #ccc;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            font-weight: bold;
        }
        .close-modal:hover {
            background: #f0f0f0;
        }

        .no-results-message {
            text-align: center;
            padding: 3rem;
            color: var(--gray);
            font-size: 1.2rem;
            display: none;
        }
        .no-results-message i {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--gray-light);
        }

        @media (max-width: 600px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 420px) {
            .card-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header class="header"></header>

<main>
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-dragon"></i> My Pokémon TCG collection
        </h1>

        <div class="search-wrapper">
            <i class="fas fa-search"></i>
            <label for="searchInput"></label><input type="text" id="searchInput"
                                                    placeholder="Search cards (e.g. 'char', 'pika', 'energy')"
                                                    autocomplete="off">
            <button id="clearSearch" title="Clear"><i class="fas fa-times"></i></button>
        </div>

        <div id="noResultsMessage" class="no-results-message">
            <i class="fas fa-search"></i>
            <p>No cards match your search.</p>
        </div>

        <section class="section-card" id="energies">
            <h2 class="section-heading"><i class="fas fa-bolt"></i> Energies</h2>
            <div class="card-grid" id="energy-container"></div>
        </section>

        <section class="section-card" id="trainers">
            <h2 class="section-heading"><i class="fas fa-user-graduate"></i> Trainers</h2>

            <div class="subsection-title"><i class="fas fa-users"></i> Supporters</div>
            <div class="card-grid" id="supporters-container"></div>

            <div class="subsection-title"><i class="fas fa-box"></i> Items</div>
            <div class="card-grid" id="items-container"></div>

            <div class="subsection-title"><i class="fas fa-screwdriver-wrench"></i> Pokémon Tools</div>
            <div class="card-grid" id="tools-container"></div>
        </section>

        <section class="section-card" id="pokemon">
            <h2 class="section-heading"><i class="fas fa-paw"></i> Pokémon roster</h2>
            <div id="pokemon-type-sections"></div>
        </section>
    </div>
</main>

<div id="imageModal" class="modal" onclick="if(event.target === this) closeModal()">
    <div class="modal-content">
        <span class="close-modal" onclick="closeModal()">&times;</span>
        <img id="modalImage" src="" alt="Pokémon card">
    </div>
</div>

<script>
    (function() {
        window.openLightbox = function(src) {
            document.getElementById('modalImage').src = src;
            document.getElementById('imageModal').style.display = 'flex';
        };
        window.closeModal = function() {
            document.getElementById('imageModal').style.display = 'none';
        };

        const energies = [
            { name: "Fusion Strike Energy", count: 1, foil: true, set: "Evolving Skies", setabbr: "EVS" },
            { name: "Fire Energy", count: 10, set: "Scarlet & Violet", setabbr: "SVI" },
            { name: "Lightning Energy", count: 10, set: "Scarlet & Violet", setabbr: "SVI" }
        ];

        const supporters = [
            { name: "Explorer's Guidance", count: 1, foil: true, set: "Temporal Forces", setabbr: "TEF" },
            { name: "Friends in Galar", count: 1, set: "Evolving Skies", setabbr: "EVS" },
            { name: "Clavell", count: 2, set: "Paldea Evolved", setabbr: "PAL" },
            { name: "Jacq", count: 3, set: "Scarlet & Violet", setabbr: "SVI" },
            { name: "Youngster", count: 2, set: "Scarlet & Violet", setabbr: "SVI" },
            { name: "Nemona", count: 4, set: "Scarlet & Violet", setabbr: "SVI" }
        ];

        const items = [
            { name: "Potion", count: 2, set: "Scarlet & Violet", setabbr: "SVI" },
            { name: "Switch", count: 2, set: "Scarlet & Violet", setabbr: "SVI" },
            { name: "Great Ball", count: 4, set: "Paldea Evolved", setabbr: "PAL" },
            { name: "Techno Radar", count: 1, foil: true, set: "Paradox Rift", setabbr: "PAR" },
            { name: "Unidentified Fossil", count: 1, set: "Fossil", setabbr: "FO" },
            { name: "Super Rod", count: 1, foil: true, set: "Paldea Evolved", setabbr: "PAL" },
            { name: "Energy Loto", count: 1, set: "Fossil", setabbr: "FO" },
            { name: "Rusted Shield", count: 1, set: "Diamond & Pearl", setabbr: "DP" }
        ];

        const tools = [
            { name: "Future Booster Energy Capsule", count: 1, set: "Telefang promo", setabbr: "TEF" },
            { name: "Technical Machine - Evolution", count: 1, set: "Paradox Rift", setabbr: "PAR" }
        ];

        function getImagePath(name) {
            return `../images/pokemon/${encodeURIComponent(name)}.jpg`;
        }

        function createItemCard(item) {
            const imgSrc = getImagePath(item.name);
            const foilBadge = item.foil ? '<span class="foil-badge"><i class="fas fa-star"></i> FOIL</span>' : '';
            const dataName = item.name.replace(/"/g, '&quot;');
            return `
                <div class="item-card" data-name="${dataName.toLowerCase()}">
                    <img class="card-thumb" src="${imgSrc}" alt="${item.name}" onclick="openLightbox('${imgSrc}')" loading="lazy">
                    <div class="item-name">
                        ${item.name}
                        <span class="qty-badge">×${item.count}</span>
                    </div>
                    ${foilBadge ? `<div style="margin-top: 0.2rem;">${foilBadge}</div>` : ''}
                    <div class="card-set">
                        <span class="set-abbr">${item.setabbr}</span> ${item.set}
                    </div>
                </div>
            `;
        }

        document.getElementById('energy-container').innerHTML = energies.map(createItemCard).join('');
        document.getElementById('supporters-container').innerHTML = supporters.map(createItemCard).join('');
        document.getElementById('items-container').innerHTML = items.map(createItemCard).join('');
        document.getElementById('tools-container').innerHTML = tools.map(createItemCard).join('');

        const typeSections = document.getElementById('pokemon-type-sections');

        function renderPokemonByType(pokemonByType) {
            typeSections.innerHTML = '';
            for (let [type, mons] of Object.entries(pokemonByType)) {
                const typeLower = type.toLowerCase();
                const sectionDiv = document.createElement('div');
                sectionDiv.classList.add('pokemon-type-block');
                sectionDiv.innerHTML = `<h3 class="subsection-title"><i class="fas fa-${typeLower === 'dragon' ? 'dragon' : 'paw'}"></i> ${type}</h3>`;
                const grid = document.createElement('div');
                grid.className = 'card-grid';

                mons.forEach(p => {
                    const card = document.createElement('div');
                    card.className = `pokemon-card type-${typeLower}`;
                    card.setAttribute('data-name', p.name.toLowerCase());
                    const imgSrc = getImagePath(p.name);
                    card.innerHTML = `
                        <img class="card-thumb" src="${imgSrc}" alt="${p.name}" onclick="openLightbox('${imgSrc}')" loading="lazy">
                        <div class="pokemon-name">${p.name}</div>
                        <div class="pokemon-details">
                            <span><i class="fas fa-arrow-up"></i> ${p.stage}</span>
                            <span><span class="hp-value">${p.hp} HP</span></span>
                        </div>
                        <div class="card-set">
                            <span class="set-abbr">${p.setabbr}</span> ${p.set}
                        </div>
                        <div style="margin-top: 0.3rem; display: flex; justify-content: flex-end;">
                            <span class="qty-badge">×${p.count}</span>
                        </div>
                    `;
                    grid.appendChild(card);
                });

                sectionDiv.appendChild(grid);
                typeSections.appendChild(sectionDiv);
            }
            filterCards();
        }

        fetch('../data/pokemon.txt')
            .then(response => {
            if (!response.ok) throw new Error('Failed to load pokemon.txt');
            return response.text();
        })
            .then(data => {
            const lines = data.split('\n').filter(line => line.trim() !== '');
            const pokemonByType = {};

            lines.forEach(line => {
                const parts = line.split(';').map(s => s.trim());
                if (parts.length < 7) return;
                const [name, stage, hp, count, setabbr, set, type] = parts;
                if (!pokemonByType[type]) pokemonByType[type] = [];
                pokemonByType[type].push({
                    name,
                    stage,
                    hp: parseInt(hp, 10),
                    count: parseInt(count, 10),
                    setabbr,
                    set
                });
            });

            renderPokemonByType(pokemonByType);
        })
            .catch(error => {
            console.error('Error loading Pokémon:', error);
            typeSections.innerHTML = '<p style="color: red; padding: 1rem;">Failed to load Pokémon data.</p>';
        });

        const searchInput = document.getElementById('searchInput');
        const clearBtn = document.getElementById('clearSearch');
        const noResultsDiv = document.getElementById('noResultsMessage');

        function getAllCards() {
            return [...document.querySelectorAll('.item-card, .pokemon-card')];
        }

        function filterCards() {
            const term = searchInput.value.trim().toLowerCase();
            const cards = getAllCards();
            let visibleCount = 0;

            cards.forEach(card => {
                const cardName = card.getAttribute('data-name') || '';
                if (term === '' || cardName.includes(term)) {
                    card.style.display = 'flex';
                    visibleCount++;
                } else {
                    card.style.display = 'none';
                }
            });
            if (term !== '' && visibleCount === 0) {
                noResultsDiv.style.display = 'block';
            } else {
                noResultsDiv.style.display = 'none';
            }
        }

        searchInput.addEventListener('input', filterCards);

        clearBtn.addEventListener('click', function() {
            searchInput.value = '';
            filterCards();
            searchInput.focus();
        });
    })();
</script>

</body>
</html>
