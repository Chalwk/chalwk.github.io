<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>My Pokémon TCG collection</title>
    <link href="../core.css" rel="stylesheet">
    <script src="../nav-menu.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Source+Code+Pro:wght@400;500;600&display=swap"
          rel="stylesheet">
    <style>
        :root {
            --card-bg: #fefefe;
            --type-psychic: #792f8c;
            --type-darkness: #5a5465;
            --type-electric: #f7d02c;
            --type-dragon: #6f35fc;
            --type-rock: #b6a136;
            --type-colorless: #707067;
            --type-fire: #ff0000;
            --type-metal: #b7b7ce;
            --type-grass: #7ac74c;
            --type-water: #6390f0;
            --type-fighting: #c22e28;
        }

        .page-title {
            font-size: 2.5rem;
            margin: 2rem 0 1rem;
            color: var(--darker);
            border-left: 6px solid var(--primary);
            padding-left: 1.2rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-title i {
            color: var(--primary);
            font-size: 2rem;
        }

        .section-card {
            background: white;
            border-radius: var(--radius-lg);
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--gray-light);
            transition: var(--transition);
        }

        .section-card:hover {
            box-shadow: var(--shadow-lg);
        }

        .section-heading {
            font-size: 1.8rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 2px solid var(--gray-light);
            padding-bottom: 0.6rem;
        }

        .section-heading i {
            color: var(--primary);
            font-size: 1.6rem;
        }

        .subsection-title {
            font-size: 1.4rem;
            font-weight: 500;
            margin: 1.8rem 0 1rem;
            color: var(--dark);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .subsection-title i {
            color: var(--secondary);
        }

        .energy-grid, .trainer-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 1rem;
            align-items: center;
        }

        .energy-chip, .trainer-chip {
            background: linear-gradient(145deg, #f0f4fa, #ffffff);
            border: 1px solid var(--gray-light);
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            box-shadow: var(--shadow-sm);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        .energy-chip i, .trainer-chip i {
            color: var(--primary);
        }
        .foil-badge {
            background: linear-gradient(135deg, #d4af37, #f5e18b);
            color: #1e1e1e;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .pokemon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-top: 1rem;
        }

        .pokemon-card {
            background: var(--card-bg);
            border-radius: var(--radius);
            padding: 0.8rem 1rem;
            border-left: 5px solid;
            box-shadow: var(--shadow-sm);
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            border-image: none;
            font-size: 0.95rem;
        }
        .pokemon-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
        }

        .pokemon-name {
            font-weight: 700;
            font-size: 1.1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .pokemon-name span {
            background: var(--primary);
            color: white;
            border-radius: 30px;
            padding: 0.2rem 0.6rem;
            font-size: 0.7rem;
            font-weight: 500;
        }

        .pokemon-details {
            display: flex;
            flex-wrap: wrap;
            gap: 0.8rem;
            margin: 0.3rem 0;
            color: var(--gray);
            font-size: 0.85rem;
        }
        .pokemon-details i {
            width: 1rem;
            color: var(--primary);
        }

        .pokemon-stage {
            background: var(--light);
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 500;
            color: var(--dark);
            display: inline-block;
            margin-right: 0.5rem;
        }

        .hp-value {
            font-weight: 600;
            color: var(--accent);
        }

        .type-badge {
            font-size: 0.7rem;
            background: rgba(0,0,0,0.05);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            text-transform: uppercase;
        }

        .qty-badge {
            background: var(--primary-dark);
            color: white;
            border-radius: 30px;
            padding: 0.1rem 0.5rem;
            font-size: 0.7rem;
            margin-left: 0.3rem;
        }

        .foil-star {
            color: #fbbf24;
            margin-left: 0.3rem;
            font-size: 0.8rem;
        }

        .type-psychic { border-left-color: var(--type-psychic); }
        .type-darkness { border-left-color: var(--type-darkness); }
        .type-electric { border-left-color: var(--type-electric); }
        .type-dragon { border-left-color: var(--type-dragon); }
        .type-rock { border-left-color: var(--type-rock); }
        .type-colorless { border-left-color: var(--type-colorless); }
        .type-fire { border-left-color: var(--type-fire); }
        .type-metal { border-left-color: var(--type-metal); }
        .type-grass { border-left-color: var(--type-grass); }
        .type-water { border-left-color: var(--type-water); }

        @media (max-width: 600px) {
            .pokemon-grid {
                grid-template-columns: 1fr 1fr;
            }
        }
        @media (max-width: 420px) {
            .pokemon-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
<header class="header"></header>

<main>
    <div class="container">
        <h1 class="page-title">
            <i class="fas fa-dragon"></i> My Pokémon TCG collection
        </h1>

        <section class="section-card" id="energies">
            <h2 class="section-heading"><i class="fas fa-bolt"></i> Energies</h2>
            <div class="energy-grid" id="energy-container"></div>
        </section>

        <section class="section-card" id="trainers">
            <h2 class="section-heading"><i class="fas fa-user-graduate"></i> Trainers</h2>

            <div class="subsection-title"><i class="fas fa-users"></i> Supporters</div>
            <div class="trainer-grid" id="supporters-container"></div>

            <div class="subsection-title"><i class="fas fa-box"></i> Items</div>
            <div class="trainer-grid" id="items-container"></div>

            <div class="subsection-title"><i class="fas fa-screwdriver-wrench"></i> Pokémon Tools</div>
            <div class="trainer-grid" id="tools-container"></div>
        </section>

        <section class="section-card" id="pokemon">
            <h2 class="section-heading"><i class="fas fa-paw"></i> Pokémon roster</h2>
            <div id="pokemon-type-sections"></div>
        </section>
    </div>
</main>

        function renderChip(item) {
            return `<div class="trainer-chip">
                <i class="fas fa-tag"></i> ${item.name} <strong>×${item.count}</strong>
                ${item.foil ? '<span class="foil-badge"><i class="fas fa-star"></i> FOIL</span>' : ''}
            </div>`;
        }

        function renderEnergyChip(item) {
            return `<div class="energy-chip">
                <i class="fas fa-bolt"></i> ${item.name} <strong>×${item.count}</strong>
                ${item.foil ? '<span class="foil-badge"><i class="fas fa-star"></i> FOIL</span>' : ''}
            </div>`;
        }

        const energyContainer = document.getElementById('energy-container');
        energies.forEach(e => energyContainer.innerHTML += renderEnergyChip(e));

        document.getElementById('supporters-container').innerHTML = supporters.map(renderChip).join('');
        document.getElementById('items-container').innerHTML = items.map(renderChip).join('');
        document.getElementById('tools-container').innerHTML = tools.map(renderChip).join('');

        const typeSections = document.getElementById('pokemon-type-sections');
        for (let [type, mons] of Object.entries(pokemonByType)) {
            const typeLower = type.toLowerCase();
            const sectionDiv = document.createElement('div');
            sectionDiv.classList.add('pokemon-type-block');
            sectionDiv.innerHTML = `<h3 class="subsection-title"><i class="fas fa-${typeLower === 'dragon' ? 'dragon' : 'paw'}"></i> ${type}</h3>`;
            const grid = document.createElement('div');
            grid.className = 'pokemon-grid';

            mons.forEach(p => {
                const card = document.createElement('div');
                card.className = `pokemon-card type-${typeLower}`;
                const foilStar = p.foil ? '<span class="foil-star" title="Holo foil"><i class="fas fa-star"></i></span>' : '';

</body>
</html>
