<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>List · alphabetizer</title>
    <meta content="Sort, clean, and transform lists - by last name, ignore articles, strip HTML, and more."
          name="description">
    <link href="../../../core.css" rel="stylesheet"/>
    <script src="../../../nav-menu.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Source+Code+Pro:wght@400;500;600&display=swap"
          rel="stylesheet">
    <link href="style.css" rel="stylesheet"/>
</head>
<body>

<header class="header"></header>

<main>
    <div class="container">
        <div class="app-grid">

            <aside class="panel panel-custom options-panel">
                <div class="panel-head">
                    <h3><i class="fas fa-sliders"></i> Sorting Options</h3>
                </div>

                <div class="option-section">
                    <h3><i class="fas fa-arrow-up-wide-short"></i> Sort mode</h3>

                    <div class="option-row">
                        <div class="radio-grid">
                            <label><input checked name="sortMode" type="radio" value="az"> A → Z</label>
                            <label><input name="sortMode" type="radio" value="za"> Z → A</label>
                            <label><input name="sortMode" type="radio" value="lastName"> By last name</label>
                            <label><input name="sortMode" type="radio" value="random"> Randomize</label>
                            <label><input name="sortMode" type="radio" value="wordNum"> By word number</label>
                        </div>
                    </div>

                    <div class="option-row with-input" id="wordNumRow" style="display:none;">
                        <label>Word index (1-based):</label>
                        <label for="sortWordNum"></label><input id="sortWordNum" min="1" style="width:70px;"
                                                                type="number" value="1">
                    </div>

                    <div class="option-row">
                        <label><input id="reverseOrder" type="checkbox"> Reverse final order</label>
                    </div>
                </div>

                <div class="option-section">
                    <h3><i class="fas fa-broom"></i> Clean list</h3>

                    <div class="checkbox-grid">
                        <label><input id="removeDuplicates" type="checkbox"> Remove duplicates</label>
                        <label><input id="stripHtml" type="checkbox"> Strip HTML tags</label>
                        <label><input id="normalizeSpaces" type="checkbox"> Normalize spaces</label>
                        <label><input id="removePunctuation" type="checkbox"> Remove punctuation</label>
                    </div>

                    <div class="option-row" style="display:flex; gap:0.75rem; flex-wrap:wrap;">
                        <label><input id="removeFirstWord" type="checkbox"> Remove first word</label>

                        <label style="display:inline-flex; align-items:center; gap:0.4rem;">
                            <input id="removeFirstChars" type="checkbox">
                            <span>Remove first N chars</span>
                            <input id="removeCharsCount" min="0" style="width:60px;" type="number" value="0">
                        </label>
                    </div>
                </div>

                <div class="option-section">
                    <h3><i class="fas fa-eye-slash"></i> Ignore when sorting</h3>

                    <div class="option-row with-input">
                        <label><input id="ignoreFirstWords" type="checkbox"> Ignore first word(s)</label>
                        <label for="ignoreWordsCount"></label><input id="ignoreWordsCount" min="1" style="width:60px;"
                                                                     type="number" value="1">
                    </div>

                    <div class="option-row" style="display:flex; gap:0.75rem; flex-wrap:wrap;">
                        <label><input id="ignoreDefinite" type="checkbox"> Ignore definite (The)</label>
                        <label><input id="ignoreIndefinite" type="checkbox"> Ignore indefinite (A, An)</label>
                    </div>

                    <div class="option-row">
                        <label style="display:inline-flex; align-items:center; gap:0.4rem;">
                            <input id="ignoreCase" type="checkbox">
                            <span>Ignore case</span>
                            <span class="help-icon" data-tip="Treat 'Apple' and 'apple' as equal"> ⓘ</span>
                        </label>
                    </div>
                </div>

                <div class="option-section">
                    <h3><i class="fas fa-paint-roller"></i> Format output</h3>

                    <div class="option-row">
                        <label>Case:</label>
                        <div class="radio-grid">
                            <label><input checked name="caseOption" type="radio" value="none"> Keep</label>
                            <label><input name="caseOption" type="radio" value="lower"> lower</label>
                            <label><input name="caseOption" type="radio" value="upper"> UPPER</label>
                            <label><input name="caseOption" type="radio" value="title"> Title</label>
                            <label><input name="caseOption" type="radio" value="sentence"> Sentence</label>
                        </div>
                    </div>

                    <div class="option-row">
                        <label><input id="addCustomText" type="checkbox"> Add text</label>
                    </div>

                    <div class="option-row" style="display:flex; gap:2rem; flex-wrap:wrap;">
                        <div style="display:flex; align-items:center; gap:0.5rem;">
                            <label for="customPrefix">Prefix:</label>
                            <input id="customPrefix" placeholder="pre" style="width:80px;" type="text">
                        </div>

                        <div style="display:flex; align-items:center; gap:0.5rem;">
                            <label for="customSuffix">Suffix:</label>
                            <input id="customSuffix" placeholder="suf" style="width:80px;" type="text">
                        </div>
                    </div>

                    <div class="option-row">
                        <label>Join items with:</label>
                    </div>

                    <div class="radio-grid" id="outputSeparatorGroup">
                        <label><input checked name="outputSeparator" type="radio" value="newline"> New line</label>
                        <label><input name="outputSeparator" type="radio" value="comma"> Comma</label>
                        <label><input name="outputSeparator" type="radio" value="tab"> Tab</label>
                        <label><input name="outputSeparator" type="radio" value="custom"> Custom</label>
                    </div>

                    <div class="option-row with-input" id="outputCustomRow" style="display:none;">
                        <label>Custom delimiter:</label>
                        <label for="outputCustomDelimiter"></label><input id="outputCustomDelimiter"
                                                                          placeholder="e.g. ," style="width:80px;"
                                                                          type="text"
                                                                          value=",">
                    </div>

                    <div class="option-row" style="display:flex; gap:1rem; flex-wrap:wrap;">
                        <label><input id="numberResults" type="checkbox"> Number results</label>

                        <div style="display:flex; align-items:center; gap:0.5rem;">
                            <label for="numberSeparator">Separator:</label>
                            <input id="numberSeparator" placeholder=". " style="width:70px;" type="text" value=". ">
                        </div>
                    </div>
                </div>

                <div class="option-section">
                    <h3><i class="fas fa-code-branch"></i> Split items by</h3>

                    <div class="radio-grid">
                        <label><input checked name="separator" type="radio" value="auto"> Auto</label>
                        <label><input name="separator" type="radio" value="newline"> New line</label>
                        <label><input name="separator" type="radio" value="comma"> Comma</label>
                        <label><input name="separator" type="radio" value="tab"> Tab</label>
                        <label><input name="separator" type="radio" value="blankline"> Blank line</label>
                        <label><input name="separator" type="radio" value="custom"> Custom</label>
                    </div>

                    <div class="option-row with-input" style="margin-top:0.3rem;">
                        <label for="customDelimiter">Custom delimiter:</label>
                        <input id="customDelimiter" placeholder="e.g. ;" style="width:80px;" type="text" value=",">
                    </div>
                </div>

            </aside>

            <section class="panel panel-custom textarea-group">
                <div class="panel-head">
                    <h2><i class="fas fa-sort-alpha-down"></i> List Alphabetizer</h2>
                    <p class="muted small">Sort, clean, and transform lists - by last name, ignore articles, strip HTML,
                        and more.</p>
                </div>

                <div class="textarea-box">
                    <label for="inputText">
                        <i class="fas fa-paste" style="margin-right:6px;"></i>
                        Paste or type your list
                    </label>

                    <textarea class="large-textarea" id="inputText"
                              placeholder="One item per line&#10;or use custom separators below"></textarea>

                    <div class="button-group">
                        <button class="btn btn-primary" id="alphabetizeBtn">
                            <i class="fas fa-sort-alpha-down"></i> Alphabetize
                        </button>
                        <button class="btn btn-secondary" id="scrambleBtn">
                            <i class="fas fa-shuffle"></i> Scramble
                        </button>
                        <button class="btn btn-secondary" id="copyBtn">
                            <i class="fas fa-copy"></i> Copy
                        </button>
                    </div>
                </div>
            </section>

        </div>
    </div>
</main>

<script src="script.js"></script>
</body>
</html>
