<!-- Basic document metadata -->
<meta charset="UTF-8">
<meta content="width=device-width, initial-scale={{ site.site_scale }}" name="viewport">

<!-- Title -->
<title>
    {% if page.title %}
    {{ page.title }} | {{ site.title }}
    {% else %}
    {{ site.title }}
    {% endif %}
</title>

<meta content="{{ page.description | default: site.description }}" name="description">

<!-- SEO -->
{% seo %}

<!-- Social metadata -->
<meta content="{{ page.title | default: site.title }}" property="og:title">
<meta content="{{ page.description | default: site.description }}" property="og:description">
<meta content="{{ page.image | default: site.image | absolute_url }}" property="og:image">
<meta content="Jericho Crosby" property="og:image:alt">
<meta content="{{ page.url | absolute_url }}" property="og:url">
<meta content="website" property="og:type">
<meta content="summary_large_image" name="twitter:card">
<meta content="{{ page.title | default: site.title }}" name="twitter:title">
<meta content="{{ page.description | default: site.description }}" name="twitter:description">
<meta content="{{ page.image | default: site.image | absolute_url }}" name="twitter:image">

<!-- Preconnect hints for external resources -->
<link href="https://fonts.googleapis.com" rel="preconnect">
<link crossorigin href="https://fonts.gstatic.com" rel="preconnect">
<link href="https://cdnjs.cloudflare.com" rel="preconnect">
<link crossorigin href="https://cdnjs.cloudflare.com" rel="preconnect">

<!-- Favicon -->
<link href="{{ site.favicon | relative_url }}" rel="icon" type="image/x-icon">

<!-- Stylesheets -->
<link href="{{ site.baseurl }}/assets/css/core.css" rel="stylesheet">
<link href="{{ site.baseurl }}/assets/css/syntax.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700& family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">

<!-- PWA manifest -->
{% if page.pwa %}
<link href="{{ '/manifest.webmanifest' | relative_url }}" rel="manifest">
{% endif %}
