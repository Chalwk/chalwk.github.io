<!-- Basic document metadata -->
<meta charset="UTF-8">
{% assign scale = site.mobile_initial_scale | default: 0.65 %}
<meta name="viewport" content="width=device-width, initial-scale={{ scale }}, user-scalable=yes, viewport-fit=cover">

<!-- Manual title & description (fallback before jekyll-seo-tag) -->
<title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta name="description" content="{{ page.description | default: site.description }}">

<!-- SEO & social meta tags (Open Graph, Facebook Cards, JSON-LD) -->
{% seo %}

<!-- Explicit Open Graph / Twitter Card (because reasons) -->
<meta property="og:title" content="{{ page.title | default: site.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">
<meta property="og:image" content="{{ page.image | default: 'https://chalwk.github.io/assets/images/avatar2.png' }}">
<meta property="og:image:alt" content="Jericho Crosby">
<meta property="og:url" content="{{ page.url | absolute_url }}">
<meta property="og:type" content="website">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ page.title | default: site.title }}">
<meta name="twitter:description" content="{{ page.description | default: site.description }}">
<meta name="twitter:image" content="{{ page.image | default: 'https://chalwk.github.io/assets/images/avatar2.png' }}">

<!-- Preconnect to external origins -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preconnect" href="https://cdnjs.cloudflare.com">

<!-- Favicon -->
<link rel="icon" href="{{ site.baseurl }}/favicon.ico" type="image/x-icon">

<!-- Stylesheets -->
<link rel="stylesheet" href="{{ site.baseurl }}/assets/css/core.css">
<link rel="stylesheet" href="{{ '/assets/css/syntax.css' | relative_url }}">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">

<!-- PWA manifest (only when page.pwa is true) -->
{% if page.pwa %}
<link rel="manifest" href="{{ site.baseurl }}{{ page.dir }}manifest.json">
{% endif %}
