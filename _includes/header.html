<header class="header">
    <div class="container">
        <a aria-label="Home - Jericho's Portfolio" class="logo" href="{{ site.baseurl }}/index.html">
            <i class="fas fa-code"></i> Jericho
        </a>

        <nav aria-label="Main Navigation" class="nav-desktop">
            {% include nav-links.html ul_class="nav-links" %}
        </nav>

        <button aria-expanded="false" aria-label="Toggle menu" class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav aria-label="Mobile Navigation" class="nav-mobile">
            {% include nav-links.html ul_class="nav-mobile-links" %}
        </nav>
    </div>
</header>

<style>
    .nav-links .donate-btn, .nav-mobile-links .donate-btn {
        background: var(--primary);
        color: white !important;
        padding: 0.5rem 1rem !important;
        border-radius: var(--radius);
        transition: var(--transition);
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
    }

    .nav-links .donate-btn:hover, .nav-mobile-links .donate-btn:hover {
        background: var(--primary-dark);
        transform: translateY(-2px);
        box-shadow: var(--shadow);
    }

    .nav-links .donate-btn i, .nav-mobile-links .donate-btn i {
        color: inherit;
    }

    .nav-links .donate-btn::after {
        display: none;
    }
</style>
