# Copyright (c) 2024-2026. Jericho Crosby (Chalwk)

# ============================================================
# Site settings
# ============================================================
title: Jericho Crosby (Chalwk)
description: Autistic developer, gamer, and advocate - building tools, mods, and games.
url: https://chalwk.github.io
baseurl: ""

# ============================================================
# Build behaviour
# ============================================================
incremental: true
highlighter: rouge
markdown: kramdown

# ============================================================
# SEO & Social sharing (used by jekyll-seo-tag)
# ============================================================
author:
  name: Jericho Crosby
  url: https://github.com/Chalwk

social:
  name: Jericho Crosby
  links:
    - https://github.com/Chalwk
    - https://www.twitch.tv/chalwk
    - https://discord.com/channels/@me/707058110396760094

locale: en_NZ

# ============================================================
# Plugins
# ============================================================
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed
  - jekyll-paginate-v2      # ← modern pagination

# ============================================================
# Pagination V2 (blog)
# ============================================================
pagination:
  enabled: true
  per_page: 5
  permalink: '/page:num/'
  title: ':title - page :num'
  sort_field: 'date'
  sort_reverse: true

# ============================================================
# Default front matter for posts and pages
# ============================================================
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Jericho Crosby"
      permalink: /blog/:year/:month/:day/:title/
  - scope:
      path: ""
      type: pages
    values:
      layout: default

# ============================================================
# PWA (Progressive Web App) configuration
# ============================================================
default_icons:
  - src: "icons/icon-192x192.png"
    sizes: "192x192"
    type: "image/png"
    purpose: "any maskable"
  - src: "icons/icon-512x512.png"
    sizes: "512x512"
    type: "image/png"
    purpose: "any maskable"

default_categories: [ "accessibility", "games" ]

default_urls:
  - "./"
  - "./index.html"
  - "./style.css"
  - "./script.js"
  - "./manifest.json"
  - "./icons/icon-192x192.png"
  - "./icons/icon-512x512.png"