# Copyright (c) 2024-2026 Jericho Crosby (Chalwk)

# Site settings
title: Jericho Crosby (Chalwk)
description: Autistic developer, gamer, and advocate - building tools, mods, and games.
url: https://chalwk.github.io
baseurl: ""
locale: en_NZ
timezone: Pacific/Auckland
site_scale: 0.65

# Build behaviour
incremental: true        # faster rebuilds
plugins_cache: true
highlighter: rouge       # syntax highlighting
markdown: kramdown
sass:
  style: compressed     # smaller CSS

# SEO & social (used by jekyll-seo-tag)
author:
  name: Jericho Crosby
  url: https://github.com/Chalwk

image: /assets/images/avatar.png

social:
  name: Jericho Crosby
  links:
    - https://github.com/Chalwk
    - https://www.twitch.tv/chalwk
    - https://discord.gg/D76H7RVPC9
    - CHALWK.DEV@GMAIL.COM

plugins:
  - jekyll-toc               # table of contents
  - jekyll-seo-tag           # meta tags + open graph
  - jekyll-sitemap           # sitemap.xml
  - jekyll-last-modified-at  # show when file last changed (see _posts)
  - jekyll-relative-links

relative_links:
  enabled: true
  collections: true

# Default front matter for posts/pages (saves typing)
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Jericho Crosby"
      permalink: /blog/:year/:month/:day/:title/
      toc: true
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      toc: true

# -------------------------------
# PWA (Progressive Web App) stuff
# -------------------------------
default_icons:
  - src: "icons/icon-192x192.png"
    sizes: "192x192"
    type: "image/png"
    purpose: "any maskable"
  - src: "icons/icon-512x512.png"
    sizes: "512x512"
    type: "image/png"
    purpose: "any maskable"

default_categories: [ "accessibility", "games" ]

default_urls: # files to cache for offline PWA
  - "./"
  - "./index.html"
  - "./style.css"
  - "./script.js"
  - "./manifest.json"
  - "./icons/icon-192x192.png"
  - "./icons/icon-512x512.png"