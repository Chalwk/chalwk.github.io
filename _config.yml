# ------------------------------------------------------------
# Site settings - the basics
# ------------------------------------------------------------
title: Jericho Crosby (Chalwk)
description: Autistic developer, gamer, and advocate - building tools, mods, and games.
url: https://chalwk.github.io
baseurl: ""
locale: en_NZ
timezone: Pacific/Auckland
mobile_initial_scale: 0.65   # makes mobile view a bit zoomed out

# ------------------------------------------------------------
# Build behaviour - speed & style
# ------------------------------------------------------------
incremental: true        # faster rebuilds
plugins_cache: true
highlighter: rouge       # syntax highlighting
markdown: kramdown
sass:
  style: compressed     # smaller CSS

# ------------------------------------------------------------
# SEO & social (used by jekyll-seo-tag)
# ------------------------------------------------------------
author:
  name: Jericho Crosby
  url: https://github.com/Chalwk

social:
  name: Jericho Crosby
  links:
    - https://github.com/Chalwk
    - https://www.twitch.tv/chalwk
    - https://discord.com/channels/@me/707058110396760094   # my discord id

image: /assets/images/avatar.png   # profile pic for cards

# ------------------------------------------------------------
# Plugins - extra features
# ------------------------------------------------------------
plugins:
  - jekyll-toc               # table of contents
  - jekyll-seo-tag           # meta tags + open graph
  - jekyll-sitemap           # generate sitemap.xml
  - jekyll-last-modified-at  # show when file last changed (see _posts)

# ------------------------------------------------------------
# Default front matter for posts/pages (saves typing)
# ------------------------------------------------------------
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      author: "Jericho Crosby"
      permalink: /blog/:year/:month/:day/:title/   # clean blog URLs
      toc: true
  - scope:
      path: ""
      type: pages
    values:
      layout: default
      toc: true

# ------------------------------------------------------------
# PWA (Progressive Web App) icons & offline urls
# ------------------------------------------------------------
default_icons:
  - src: "icons/icon-192x192.png"
    sizes: "192x192"
    type: "image/png"
    purpose: "any maskable"
  - src: "icons/icon-512x512.png"
    sizes: "512x512"
    type: "image/png"
    purpose: "any maskable"

default_categories: [ "accessibility", "games" ]

default_urls:   # files to cache for offline PWA
  - "./"
  - "./index.html"
  - "./style.css"
  - "./script.js"
  - "./manifest.json"
  - "./icons/icon-192x192.png"
  - "./icons/icon-512x512.png"